id: NDPR
display_name: "Nigeria Data Protection Regulation 2019"
issuing_body: NITDA
documents:
  - documents/ndpr_implementation_framework.pdf
clauses:
  - ref: "NDPR Art. 2.2"
    title: "Lawful basis for processing personal data"
    summary: >
      Data Controllers and Administrators must process personal data only on a legally
      justifiable basis (NDPR Implementation Framework §3.2(ii), citing Article 2.2 of the
      Regulation).
    finding_hints:
      - "exposed database"
      - "unauthenticated data access"
      - "PII exposure"
      - "customer data"

  - ref: "NDPR Art. 2.5"
    title: "Privacy policy publication"
    summary: >
      A Data Controller must prepare and publish a privacy policy on every medium of personal
      data collection within 3 months of commencing business operations (§3.2(iii)).
    finding_hints:
      - "missing privacy policy"
      - "public web application"
      - "customer-facing website"

  - ref: "NDPR Art. 2.6"
    title: "Systems designed and maintained for data protection"
    summary: >
      Data Controllers must design and maintain systems that are data-protection compliant and
      ensure continuous improvement of their information security architecture to prevent
      possible data breaches (§3.2(v)).
    finding_hints:
      - "outdated software"
      - "unpatched service"
      - "weak encryption"
      - "exposed admin panel"
      - "default credentials"
      - "missing tls"
      - "expired certificate"

  - ref: "NDPR Art. 2.10 / 4.1(8)"
    title: "Data privacy breach notification"
    summary: >
      A Data Controller has a duty of self-reporting Personal Data breaches to NITDA within 72
      hours of becoming aware of the breach (§9.2, citing Articles 2.10 and 4.1(8)).
    finding_hints:
      - "data breach"
      - "unauthorized access"
      - "leaked credentials"
      - "exposed data store"

  - ref: "NDPR Art. 2.11"
    title: "Transfer of personal data abroad"
    summary: >
      Cross-border transfer of personal data requires documented safeguards, an overview of the
      encryption method and data security standards, and confirmation the destination country is
      on NITDA's White List (or a documented exception under Article 2.12) (§7).
    finding_hints:
      - "foreign hosting"
      - "offshore server"
      - "cloud provider outside nigeria"
      - "international data transfer"

  - ref: "NDPR Art. 3.1(7)(m)"
    title: "Notice before further processing"
    summary: >
      Where a Controller intends to further process Personal Data for a purpose other than that
      for which it was originally collected, the Data Subject must be informed of the new
      purpose before that further processing occurs (§4.1).
    finding_hints:
      - "data reuse"
      - "profiling"
      - "analytics tracking"

  - ref: "NDPR Art. 4.1(2)"
    title: "Appointment of a Data Protection Officer"
    summary: >
      A Data Controller must appoint a dedicated Data Protection Officer, based in Nigeria, where
      it is a government organ, processes the Personal Data of over 10,000 Data Subjects per
      annum, processes Sensitive Personal Data in the regular course of business, or possesses
      critical national information infrastructure containing Personal Data (§3.4).
    finding_hints:
      - "no named security or privacy contact"
      - "governance gap"
      - "critical infrastructure exposure"

  - ref: "NDPR Art. 4.1(5)"
    title: "Annual data protection audit"
    summary: >
      Data Controllers and Administrators must conduct a data protection audit within 12 months
      of incorporation and annually thereafter, assessing compliance and identifying gaps and
      weaknesses in the organisation's processes (§6).
    finding_hints:
      - "missing security assessment"
      - "no audit trail"
      - "stale security posture"

  - ref: "NDPR Art. 4.1(4)"
    title: "Verifiable evidence of data protection controls"
    summary: >
      A licensed Data Protection Compliance Organisation must base its audit findings on
      verifiable documents and practices when evaluating an organisation's compliance status,
      including its technical and organisational controls (§6.5).
    finding_hints:
      - "unverified security controls"
      - "no documented security policy"
